<div class="container pt-7 pb-3">
    <div class="text-center">
      <div class="row gy-3 py-3 overflow-auto">
        @for (product of products; track product._id) {
            <div class="col-6 col-md-3">
            <div class="product p-2 shadow h-100 d-flex flex-column">
            <div>
            <img [src]="product.imageCover" class="w-50" />
            </div>
            <h5 class="mt-2 text-start text-main">{{product.category.name}}</h5>
            <p class="mt-2 text-start"><a class="text-black text-decoration-none" href="">{{product.title.split(' ').slice(0,6).join(" ") + "..."}}</a></p>
            <div class="flex-grow-1"></div>
            <div class="d-flex justify-content-between">
              <h5 class="text-start text-black">{{product.price}} <span class="text-success"> $</span></h5>
              <h5 class="text-start text-black">{{product.ratingsAverage}}<i class="fa-solid fa-star text-warning fs-4"></i></h5>
            </div>
            <button class="bg-main w-100 text-white btn">Add <i class="fa-solid fa-cart-shopping fs-6"></i></button>
            </div>
            </div>
        }
        @empty {
          <div class="d-flex justify-content-center align-items-center vh-50">
          <span class="loader"></span>
        </div>
        }
      </div>
    </div>
    </div>
