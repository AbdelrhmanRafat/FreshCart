<div class="container py-4">
    <h4>Address Data</h4>
    <hr/>
    <div class="row">
        <div class="col-md-6">
            <div class="card p-2 h-auto">
            <form class="h-100" [formGroup]="address" (ngSubmit)="payment()">
                <div class="p-4 d-flex flex-column justify-content-start gap-3 h-100 align-items-start">
                <div class="w-100">
                <h4 class="pb-1">Address : </h4>
                <textarea formControlName="details" class="form-control" rows="5" placeholder="Address Data"></textarea>
                </div>
                <div class="w-100">
                <h4 class="pb-1">Phone : </h4>
                <input formControlName="phone" class="form-control" placeholder="Phone No." type="text" />
                </div>
                <div class="w-100">
                <h4 class="pb-1">City : </h4>
                <input formControlName="city" class="form-control" placeholder="City" type="text" />
                </div>
                <div>
                    <button class="btn bg-main text-white">Check Out</button>
                </div>
                </div>
            </form>
            </div>
        </div>
        <div class="col-md-6">
            <img [src]="'assets/images/creditCard.png'" class="img-fluid" alt="credit img" />
        </div>
    </div>
</div>
