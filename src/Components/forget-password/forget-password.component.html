<div class="bg-light py-5">
@if(currentStep == 1){
    <div class="w-75 mx-auto">
        <form [formGroup]="forgetPassword" (ngSubmit)="sendforgetPassword()">
       <h3 class="text-black fw-semibold">Forget Password : </h3>
       <h5 class="py-2">Email : </h5>
       <input [ngClass]="getValidatorClassName('email')" formControlName="email" class="form-control p-3" placeholder="Enter Your Email : " type="email" />
       <alert-error [formName]="forgetPassword" controlName="email" />
       <div class="py-3">
        <button class="btn btn-success text-white">
          Send
      </button>
      </div>
      </form>
      </div>
}
@else if (currentStep == 2) {
    <div class="w-75 mx-auto">
        <form [formGroup]="verificationCode" (ngSubmit)="sendverifyCode()">
       <h3 class="text-black fw-semibold">Forget Password : </h3>
       <h5 class="py-2">Verify Code : </h5>
       <input [ngClass]="getValidatorClassName('resetCode')" formControlName="resetCode" class="form-control p-3" placeholder="Enter Verification code : " type="text" />
       <alert-error [formName]="verificationCode" controlName="code" />
       <div class="py-3">
        <button class="btn btn-success text-white">
          Send
      </button>
      </div>
      </form>
      </div>
}
@else if (currentStep == 3) {
    <div class="w-75 mx-auto">
        <form [formGroup]="resetPassword" (ngSubmit)="sendResetPassword()">
       <h3 class="text-black fw-semibold">Forget Password</h3>
       <input [ngClass]="getValidatorClassName('email')" formControlName="email" class="form-control p-3 d-none" placeholder="Enter Your Email : " type="email" />
       <alert-error [formName]="resetPassword" controlName="email" />
       <h5 class="py-2">New Password : </h5>
       <input [ngClass]="getValidatorClassName('newPassword')" formControlName="newPassword" class="form-control p-3" placeholder="Enter New Password : " type="password" />
       <alert-error [formName]="resetPassword" controlName="password" />
       <div class="py-3">
        <button class="btn btn-success text-white">
          Send
      </button>
      </div>
      </form>
      </div>
}
</div>
