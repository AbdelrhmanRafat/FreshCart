<div class="container mb-3">
    @if(product != null){
        <div class="row">
        <div class="col-md-3">
        <img [src]="product.imageCover" class="img-fluid shadow" />
        </div>
        <div class="col-md-9">
            <div class="inner px-3 d-flex flex-column justify-content-center gap-2 h-100">
                <h2 class="text-main fw-bolder w-100">{{product.title}}</h2>
                <p>{{product.description}}</p>
                <p class="text-main">{{product.price + " EGP"}}</p>
                <div class="d-flex justify-content-between align-items-center">
                    <p>Quantity : {{product.quantity}}</p>
                    <p>{{product.ratingsAverage + " "}}<span><i class="fa-solid fa-star text-warning fs-5"></i></span></p>
                </div>
            </div>
        </div>
    </div>
}
@else {
    <div class="d-flex justify-content-center align-items-center vh-50">
        <span class="loader"></span>
      </div>
}
</div>
