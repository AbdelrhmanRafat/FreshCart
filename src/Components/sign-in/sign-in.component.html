<div class="bg-light py-5">
    <div class="w-75 mx-auto py-5">
    <form [formGroup]="signIn" (ngSubmit)="sendData()">
     <h3 class="text-black fw-semibold">Login Now : </h3>
     <h5 class="py-3">Email : </h5>
     <input formControlName = "email" [ngClass]="getValidatorClassName('email')" class="form-control p-3" placeholder="Enter Your Email : " type="email" />
     <alert-error [formName]="signIn" controlName="email" />
     <h5 class="py-3">Password : </h5>
     <input formControlName = "password" [ngClass]="getValidatorClassName('password')" class="form-control p-3" placeholder="Enter Your Password : " type="password" />
     <alert-error [formName]="signIn" controlName="password" />
     <div class="py-4 d-flex justify-content-between align-items-center">
    <div>
     <button class="btn btn-success text-white">
        Login
     </button>
     </div>
     <a [routerLink]="'/forgetpassword'" (click)="goToForgetPass()" class="text-success text-decoration-none fw-semibold fs-5">Forgotten password?</a>
    </div>
    </form>
    </div>
    </div>
